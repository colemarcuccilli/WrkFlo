<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wrkflo - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a2e;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            width: 260px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 1rem;
        }

        p {
            color: #888;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .signup-form {
            display: flex;
            gap: 0.5rem;
            max-width: 420px;
            margin: 0 auto;
        }

        .signup-form input[type="email"] {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }

        .signup-form input[type="email"]:focus {
            border-color: #1a1a2e;
        }

        .signup-form button {
            padding: 0.85rem 1.8rem;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .signup-form button:hover {
            background: #2d2d4a;
        }

        .success-message {
            display: none;
            color: #1a1a2e;
            font-weight: 500;
            font-size: 1rem;
            margin-top: 1rem;
        }

        @media (max-width: 480px) {
            .logo {
                width: 200px;
            }

            .signup-form {
                flex-direction: column;
            }

            .signup-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="wrkflo" class="logo">
        <h1>Coming Soon</h1>
        <p>Sign up for our newsletter to get updates.</p>
        <form class="signup-form" id="signupForm">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Subscribe</button>
        </form>
        <p class="success-message" id="successMessage">Thanks! We'll keep you posted.</p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>
</body>
</html>
